services:
  db:
    image: postgres:16
    container_name: eventfinder_db
    environment:
      POSTGRES_DB: eventfinder
      POSTGRES_USER: eventfinder
      POSTGRES_PASSWORD: eventfinder
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    image: maven:3.9-eclipse-temurin-17
    container_name: eventfinder_backend
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
      - m2_cache:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/eventfinder
      SPRING_DATASOURCE_USERNAME: eventfinder
      SPRING_DATASOURCE_PASSWORD: eventfinder
      APP_CORS_ORIGINS: "*"
    ports:
      - "8080:8080"
    command: mvn spring-boot:run -DskipTests
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: eventfinder_frontend
    working_dir: /workspace
    volumes:
      - ./frontend:/workspace
    environment:
      # Local development - uses localhost
      # The config.js will automatically handle API calls
      VITE_API_BASE: http://localhost:8080
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  db_data:
  m2_cache:
