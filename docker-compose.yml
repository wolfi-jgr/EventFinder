services:
  db:
    image: postgres:16
    container_name: eventfinder_db
    environment:
      POSTGRES_DB: eventfinder
      POSTGRES_USER: eventfinder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error: POSTGRES_PASSWORD not set}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventfinder"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: maven:3.9-eclipse-temurin-17
    container_name: eventfinder_backend
    working_dir: /workspace
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/eventfinder
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:eventfinder}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?error: SPRING_DATASOURCE_PASSWORD not set}
      APP_CORS_ORIGINS: "*"
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
    volumes:
      - ./backend:/workspace
      - m2_cache:/root/.m2
      - scraper_data:/app/scraper-data
    command: mvn spring-boot:run
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: eventfinder_frontend
    working_dir: /workspace/frontend
    volumes:
      - ./:/workspace
    environment:
      # Local development - uses localhost
      # The config.js will automatically handle API calls
      VITE_API_BASE: http://localhost:8080
    ports:
      - "5173:5173"
    command: sh -c "cd /workspace/frontend && npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  db_data:
  m2_cache:
  scraper_data:
