# Production Docker Compose Configuration
# This is for running the production build locally to test before deploying

services:
  db:
    image: postgres:16
    container_name: eventfinder_db_prod
    environment:
      POSTGRES_DB: eventfinder
      POSTGRES_USER: eventfinder
      # For local prod-compose runs this falls back to a default. In real
      # production change this to a secure password via environment variables
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventfinder}
    ports:
      - "5432:5432"
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventfinder"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventfinder_backend_prod
    environment:
      # Allow overriding the JDBC URL from the environment (e.g. when
      # connecting to Supabase). Fallback to the local `db` service.
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/eventfinder}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-eventfinder}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-eventfinder}
      APP_CORS_ORIGINS: "${APP_CORS_ORIGINS:-*}"
    volumes:
      - scraper_data_prod:/app/scraper-data
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Inject Vite build-time API base. If not provided, defaults to
        # localhost so a local production build talks to the local backend.
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8080}
    container_name: eventfinder_frontend_prod
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data_prod:
  scraper_data_prod:
