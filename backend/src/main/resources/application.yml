server:
  port: ${PORT:8080}
  servlet:
    session:
      cookie:
        path: /
        http-only: true
        secure: ${SERVER_SERVLET_SESSION_COOKIE_SECURE:false}
        same-site: None

spring:
  config:
    import: optional:classpath:scrape-rules.yml

  datasource:
    url: ${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/eventfinder}}
    username: ${SPRING_DATASOURCE_USERNAME:${JDBC_DATABASE_USERNAME:eventfinder}}
    password: ${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:eventfinder}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Europe/Vienna


app:
  cors-origins: ${APP_CORS_ORIGINS:http://localhost:5173}

  jwt:
    secret: ${JWT_SECRET:default-secret-key-for-development-only-min-32-chars}
    # Token expiration in milliseconds (7 days = 604800000)
    expiration: ${JWT_EXPIRATION:604800000}

  events:
    club-categories: ${APP_EVENTS_CLUB_CATEGORIES:PARTY,CLUB}

    cleanup:
      cron: ${APP_EVENTS_CLEANUP_CRON:0 15 6 * * *}
      zone: ${APP_EVENTS_CLEANUP_ZONE:Europe/Vienna}
      retention-days: ${APP_EVENTS_CLEANUP_RETENTION_DAYS:0}


scraper:
  enabled: true
  min-delay-between-requests: 2000
  max-delay-between-requests: 5000
  connection-timeout: 10000
  max-retries: 3
  max-concurrent-scrapers: 3
  follow-redirects: true
  user-agent: "Mozilla/5.0"
  html-storage-path: ./scraper-data