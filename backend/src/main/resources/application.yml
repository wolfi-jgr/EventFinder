server:
  port: 8080

spring:
  config:
    import: optional:classpath:scrape-rules.yml
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eventfinder}
    username: ${SPRING_DATASOURCE_USERNAME:eventfinder}
    password: ${SPRING_DATASOURCE_PASSWORD:eventfinder}
  jpa:
    hibernate:
      ddl-auto: validate  # Changed to validate since Flyway manages schema
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Europe/Vienna

app:
  cors-origins: ${APP_CORS_ORIGINS:http://localhost:5173}

# Web Scraper Configuration
scraper:
  enabled: true
  min-delay-between-requests: 2000  # 2 seconds
  max-delay-between-requests: 5000  # 5 seconds
  connection-timeout: 10000         # 10 seconds
  max-retries: 3
  max-concurrent-scrapers: 3
  follow-redirects: true
  user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
  html-storage-path: ./scraper-data

